        const suratYasinData = [
            { no: 1, arab: "يٰسۤ ۚ", latin: "Yā sīn.", arti: "Ya Sin." },
            { no: 2, arab: "وَالْقُرْاٰنِ الْحَكِيْمِۙ", latin: "Wal-qur'ānil-ḥakīm(i).", arti: "Demi Al-Qur'an yang penuh hikmah," },
            { no: 3, arab: "اِنَّكَ لَمِنَ الْمُرْسَلِيْنَۙ", latin: "Innaka laminal-mursalīn(a).", arti: "Sungguh, engkau (Muhammad) adalah salah seorang rasul," },
            { no: 4, arab: "عَلٰى صِرَاطٍ مُّسْتَقِيْمٍۗ", latin: "‘Alā ṣirāṭim mustaqīm(in).", arti: "(yang berada) di atas jalan yang lurus," },
            { no: 5, arab: "تَنْزِيْلَ الْعَزِيْزِ الرَّحِيْمِۙ", latin: "Tanzīlal-‘azīzir-raḥīm(i).", arti: "(Sebagai wahyu) yang diturunkan oleh (Allah) Yang Mahaperkasa lagi Maha Penyayang," },
            { no: 6, arab: "لِتُنْذِرَ قَوْمًا مَّآ اُنْذِرَ اٰبَاۤؤُهُمْ فَهُمْ غٰفِلُوْنَ", latin: "Litunżira qaumam mā unżira ābā'uhum fahum gāfilūn(a).", arti: "Agar engkau memberi peringatan kepada suatu kaum yang nenek moyangnya belum pernah diberi peringatan, karena itu mereka lalai." },
            { no: 7, arab: "لَقَدْ حَقَّ الْقَوْلُ عَلٰٓى اَكْثَرِهِمْ فَهُمْ لَا يُؤْمِنُوْنَ", latin: "Laqad ḥaqqal-qaulu ‘alā akṡarihim fahum lā yu'minūn(a).", arti: "Sungguh, pasti berlaku perkataan (hukuman) terhadap kebanyakan mereka, karena mereka tidak beriman." },
            { no: 8, arab: "اِنَّا جَعَلْنَا فِيْٓ اَعْنَاقِهِمْ اَغْلٰلًا فَهِيَ اِلَى الْاَذْقَانِ فَهُمْ مُّقْمَحُوْنَ", latin: "Innā ja‘alnā fī a‘nāqihim aglālan fahiya ilal-ażqāni fahum muqmaḥūn(a).", arti: "Sungguh, Kami telah memasang belenggu di leher mereka, lalu tangan mereka (diangkat) ke dagu, karena itu mereka tertengadah." },
            { no: 9, arab: "وَجَعَلْنَا مِنْۢ بَيْنِ اَيْدِيْهِمْ سَدًّا وَّمِنْ خَلْفِهِمْ سَدًّا فَاَغْشَيْنٰهُمْ فَهُمْ لَا يُبْصِرُوْنَ", latin: "Wa ja‘alnā mim baini aidīhim saddaw wa min khalfihim saddan fa agsyaināhum fahum lā yubṣirūn(a).", arti: "Dan Kami jadikan di hadapan mereka sekat (dinding) dan di belakang mereka juga sekat, dan Kami tutup (mata) mereka sehingga mereka tidak dapat melihat." },
            { no: 10, arab: "وَسَوَاۤءٌ عَلَيْهِمْ ءَاَنْذَرْتَهُمْ اَمْ لَمْ تُنْذِرْهُمْ لَا يُؤْمِنُوْنَ", latin: "Wa sawā'un ‘alaihim a'anżartahum am lam tunżirhum lā yu'minūn(a).", arti: "Dan sama saja bagi mereka, apakah engkau memberi peringatan kepada mereka atau engkau tidak memberi peringatan kepada mereka, mereka tidak akan beriman juga." },
            { no: 11, arab: "اِنَّمَا تُنْذِرُ مَنِ اتَّبَعَ الذِّكْرَ وَخَشِيَ الرَّحْمٰنَ بِالْغَيْبِۚ فَبَشِّرْهُ بِمَغْفِرَةٍ وَّاَجْرٍ كَرِيْمٍ", latin: "Innamā tunżiru manittaba‘aż-żikra wa khasyiyar-raḥmāna bil-gaib(i), fabasysyirhu bimagfiratiw wa ajring karīm(in).", arti: "Sesungguhnya engkau hanya memberi peringatan kepada orang-orang yang mau mengikuti peringatan dan yang takut kepada Tuhan Yang Maha Pengasih, walaupun mereka tidak melihat-Nya. Maka berilah mereka kabar gembira dengan ampunan dan pahala yang mulia." },
            { no: 12, arab: "اِنَّا نَحْنُ نُحْيِ الْمَوْتٰى وَنَكْتُبُ مَا قَدَّمُوْا وَاٰثَارَهُمْۗ وَكُلَّ شَيْءٍ اَحْصَيْنٰهُ فِيْٓ اِمَامٍ مُّبِيْنٍ", latin: "Innā naḥnu nuḥyil-mautā wa naktubu mā qaddamū wa āṡārahum, wa kulla syai'in aḥṣaināhu fī imāmim mubīn(in).", arti: "Sungguh, Kamilah yang menghidupkan orang-orang yang mati, dan Kamilah yang mencatat apa yang telah mereka kerjakan dan bekas-bekas yang mereka (tinggalkan). Dan segala sesuatu Kami kumpulkan dalam Kitab yang jelas (Lauh Mahfuzh)." },
            { no: 13, arab: "وَاضْرِبْ لَهُمْ مَّثَلًا اَصْحٰبَ الْقَرْيَةِۘ اِذْ جَاۤءَهَا الْمُرْسَلُوْنَۚ", latin: "Waḍrib lahum maṡalan aṣḥābal-qaryah(ti), iż jā'ahal-mursalūn(a).", arti: "Dan buatlah suatu perumpamaan bagi mereka, yaitu penduduk suatu negeri, ketika utusan-utusan datang kepada mereka;" },
            { no: 14, arab: "اِذْ اَرْسَلْنَآ اِلَيْهِمُ اثْنَيْنِ فَكَذَّبُوْهُمَا فَعَزَّزْنَا بِثَالِثٍ فَقَالُوْٓا اِنَّآ اِلَيْكُمْ مُّرْسَلُوْنَ", latin: "Iż arsalnā ilaihimuṡnaini fa każżabūhumā fa ‘azzaznā biṡāliṡin fa qālū innā ilaikum mursalūn(a).", arti: "(Yaitu) ketika Kami mengutus kepada mereka dua orang utusan, lalu mereka mendustakan keduanya; kemudian Kami kuatkan dengan (utusan) yang ketiga, maka ketiga utusan itu berkata, \"Sungguh, kami adalah orang-orang yang diutus kepadamu.\"" },
            { no: 15, arab: "قَالُوْا مَآ اَنْتُمْ اِلَّا بَشَرٌ مِّثْلُنَاۙ وَمَآ اَنْزَلَ الرَّحْمٰنُ مِنْ شَيْءٍۙ اِنْ اَنْتُمْ اِلَّا تَكْذِبُوْنَ", latin: "Qālū mā antum illā basyarum miṡlunā wa mā anzalar-raḥmānu min syai'(in), in antum illā takżibūn(a).", arti: "Mereka (penduduk negeri) menjawab, \"Kamu ini hanyalah manusia biasa seperti kami, dan Tuhan Yang Maha Pengasih tidak menurunkan sesuatu apa pun; kamu hanyalah pendusta belaka.\"" },
            { no: 16, arab: "قَالُوْا رَبُّنَا يَعْلَمُ اِنَّآ اِلَيْكُمْ لَمُرْسَلُوْنَ", latin: "Qālū rabbunā ya‘lamu innā ilaikum lamursalūn(a).", arti: "Mereka (utusan-utusan itu) berkata, \"Tuhan kami mengetahui sesungguhnya kami adalah utusan-utusan(-Nya) kepada kamu." },
            { no: 17, arab: "وَمَا عَلَيْنَآ اِلَّا الْبَلٰغُ الْمُبِيْنُ", latin: "Wa mā ‘alainā illal-balāgul-mubīn(u).", arti: "Dan kewajiban kami hanyalah menyampaikan (perintah Allah) dengan jelas.\"" },
            { no: 18, arab: "قَالُوْٓا اِنَّا تَطَيَّرْنَا بِكُمْۚ لَىِٕنْ لَّمْ تَنْتَهُوْا لَنَرْجُمَنَّكُمْ وَلَيَمَسَّنَّكُمْ مِّنَّا عَذَابٌ اَلِيْمٌ", latin: "Qālū innā taṭayyarnā bikum, la'il lam tantahū lanarjumannakum wa layamassannakum minnā ‘ażābun alīm(un).", arti: "Mereka menjawab, \"Sesungguhnya kami bernasib malang karena kamu. Sungguh, jika kamu tidak berhenti (menyeru kami), niscaya kami rajam kamu dan kamu pasti akan merasakan siksaan yang pedih dari kami.\"" },
            { no: 19, arab: "قَالُوْا طَاۤىِٕرُكُمْ مَّعَكُمْۗ اَىِٕنْ ذُكِّرْتُمْۗ بَلْ اَنْتُمْ قَوْمٌ مُّسْرِفُوْنَ", latin: "Qālū ṭā'irukum ma‘akum, a'in żukkirtum, bal antum qaumum musrifūn(a).", arti: "Mereka (utusan-utusan itu) berkata, \"Kemalangan kamu itu adalah karena kamu sendiri. Apakah karena kamu diberi peringatan? Sebenarnya kamu adalah kaum yang melampaui batas.\"" },
            { no: 20, arab: "وَجَاۤءَ مِنْ اَقْصَا الْمَدِيْنَةِ رَجُلٌ يَّسْعٰى قَالَ يٰقَوْمِ اتَّبِعُوا الْمُرْسَلِيْنَۙ", latin: "Wa jā'a min aqṣal-madīnati rajuluy yas‘ā qāla yā qaumittabi‘ul-mursalīn(a).", arti: "Dan datanglah dari ujung kota, seorang laki-hari dengan bergegas dia berkata, \"Wahai kaumku! Ikutilah utusan-utusan itu." },
            { no: 21, arab: "اتَّبِعُوْا مَنْ لَّا يَسْـَٔلُكُمْ اَجْرًا وَّهُمْ مُّهْتَدُوْنَ", latin: "Ittabi‘ū mal lā yas'alukum ajraw wa hum muhtadūn(a).", arti: "Ikutilah orang yang tiada minta balasan kepadamu; dan mereka adalah orang-orang yang mendapat petunjuk." },
            { no: 22, arab: "وَمَا لِيَ لَآ اَعْبُدُ الَّذِيْ فَطَرَنِيْ وَاِلَيْهِ تُرْجَعُوْنَ", latin: "Wa mā liya lā a‘budul-lażī faṭaranī wa ilaihi turja‘ūn(a).", arti: "Dan mengapa aku tidak menyembah (Tuhan) yang telah menciptakanku dan hanya kepada-Nya kamu akan dikembalikan?" },
            { no: 23, arab: "ءَاَتَّخِذُ مِنْ دُوْنِهٖٓ اٰلِهَةً اِنْ يُّرِدْنِ الرَّحْمٰنُ بِضُرٍّ لَّا تُغْنِ عَنِّيْ شَفَاعَتُهُمْ شَيْـًٔا وَّلَا يُنْقِذُوْنِۚ", latin: "A'attakhiżu min dūnihī ālihatan iy yuridnir-raḥmānu biḍurril lā tugni ‘annī syafā‘atuhum syai'aw wa lā yunqiżūn(i).", arti: "Mengapa aku akan menyembah tuhan-tuhan selain-Nya? Jika (Tuhan) Yang Maha Pengasih menghendaki bencana terhadapku, pastilah syafaat mereka tidak berguna sedikit pun bagi diriku dan mereka tidak dapat menyelamatkanku." },
            { no: 24, arab: "اِنِّيْٓ اِذًا لَّفِيْ ضَلٰلٍ مُّبِيْنٍ", latin: "Innī iżal lafī ḍalālim mubīn(in).", arti: "Sesungguhnya jika aku berbuat demikian, pastilah aku berada dalam kesesatan yang nyata." },
            { no: 25, arab: "اِنِّيْٓ اٰمَنْتُ بِرَبِّكُمْ فَاسْمَعُوْنِۗ", latin: "Innī āmantu birabbikum fasma‘ūn(i).", arti: "Sesungguhnya aku telah beriman kepada Tuhanmu; maka dengarkanlah (pengakuan keimanan)ku.\"" },
            { no: 26, arab: "قِيْلَ ادْخُلِ الْجَنَّةَ ۗقَالَ يٰلَيْتَ قَوْمِيْ يَعْلَمُوْنَۙ", latin: "Qīladkhulil-jannah(ta), qāla yā laita qaumī ya‘lamūn(a).", arti: "Dikatakan (kepadanya), \"Masuklah ke dalam surga.\" Dia (laki-laki itu) berkata, \"Alangkah baiknya sekiranya kaumku mengetahui," },
            { no: 27, arab: "بِمَا غَفَرَ لِيْ رَبِّيْ وَجَعَلَنِيْ مِنَ الْمُكْرَمِيْنَ", latin: "Bimā gafara lī rabbī wa ja‘alanī minal-mukramīn(a).", arti: "apa yang menyebabkan Tuhanku memberi ampun kepadaku dan menjadikan aku termasuk orang-orang yang dimuliakan.\"" },
            { no: 28, arab: "۞ وَمَآ اَنْزَلْنَا عَلٰى قَوْمِهٖ مِنْۢ بَعْدِهٖ مِنْ جُنْدٍ مِّنَ السَّمَاۤءِ وَمَا كُنَّا مُنْزِلِيْنَ", latin: "Wa mā anzalnā ‘alā qaumihī mim ba‘dihī min jundim minas-samā'i wa mā kunnā munzilīn(a).", arti: "Dan Kami tidak menurunkan kepada kaumnya sesudah dia (meninggal) suatu pasukan pun dari langit dan Kami tidak pantas menurunkannya." },
            { no: 29, arab: "اِنْ كَانَتْ اِلَّا صَيْحَةً وَّاحِدَةً فَاِذَا هُمْ خَامِدُوْنَ", latin: "In kānat illā ṣaiḥataw wāḥidatan fa iżā hum khāmidūn(a).", arti: "Tidak ada siksaan terhadap mereka melainkan satu teriakan saja; maka tiba-tiba mereka semuanya mati." },
            { no: 30, arab: "يٰحَسْرَةً عَلَى الْعِبَادِۚ مَا يَأْتِيْهِمْ مِّنْ رَّسُوْلٍ اِلَّا كَانُوْا بِهٖ يَسْتَهْزِءُوْنَ", latin: "Yā ḥasratan ‘alal-‘ibād(i), mā ya'tīhim mir rasūlin illā kānū bihī yastahzi'ūn(a).", arti: "Alangkah besarnya penyesalan terhadap hamba-hamba itu, setiap datang seorang rasul kepada mereka, mereka selalu memperolok-olokkannya." },
            { no: 31, arab: "اَلَمْ يَرَوْا كَمْ اَهْلَكْنَا قَبْلَهُمْ مِّنَ الْقُرُوْنِ اَنَّهُمْ اِلَيْهِمْ لَا يَرْجِعُوْنَ", latin: "Alam yarau kam ahlaknā qablahum minal-qurūni annahum ilaihim lā yarji‘ūn(a).", arti: "Tidakkah mereka mengetahui berapa banyak umat-umat sebelum mereka yang telah Kami binasakan. Orang-orang (yang telah Kami binasakan) itu tidak ada yang kembali kepada mereka." },
            { no: 32, arab: "وَاِنْ كُلٌّ لَّمَّا جَمِيْعٌ لَّدَيْنَا مُحْضَرُوْنَ", latin: "Wa in kullul lammā jamī‘ul ladainā muḥḍarūn(a).", arti: "Dan setiap mereka semuanya akan dikumpulkan lagi kepada Kami." },
            { no: 33, arab: "وَاٰيَةٌ لَّهُمُ الْاَرْضُ الْمَيْتَةُ ۖاَحْيَيْنٰهَا وَاَخْرَجْنَا مِنْهَا حَبًّا فَمِنْهُ يَأْكُلُوْنَ", latin: "Wa āyatul lahumul-arḍul-maitah(tu), aḥyaināhā wa akhrajnā minhā ḥabban faminhu ya'kulūn(a).", arti: "Dan suatu tanda (kekuasaan Allah) bagi mereka adalah bumi yang mati (tandus); Kami hidupkan bumi itu dan Kami keluarkan daripadanya biji-bijian, maka daripadanya mereka makan." },
            { no: 34, arab: "وَجَعَلْنَا فِيْهَا جَنّٰتٍ مِّنْ نَّخِيْلٍ وَّاَعْنَابٍ وَّفَجَّرْنَا فِيْهَا مِنَ الْعُيُوْنِۙ", latin: "Wa ja‘alnā fīhā jannātim min nakhīliw wa a‘nābiw wa fajjarnā fīhā minal-‘uyūn(i).", arti: "Dan Kami jadikan padanya di bumi itu kebun-kebun kurma dan anggur dan Kami pancarkan padanya beberapa mata air," },
            { no: 35, arab: "لِيَأْكُلُوْا مِنْ ثَمَرِهٖۙ وَمَا عَمِلَتْهُ اَيْدِيْهِمْ ۗ اَفَلَا يَشْكُرُوْنَ", latin: "Liya'kulū min ṡamarihī wa mā ‘amilathu aidīhim, afalā yasykurūn(a).", arti: "agar mereka dapat makan dari buahnya, dan dari hasil usaha tangan mereka. Maka mengapakah mereka tidak bersyukur?" },
            { no: 36, arab: "سُبْحٰنَ الَّذِيْ خَلَقَ الْاَزْوَاجَ كُلَّهَا مِمَّا تُنْبِتُ الْاَرْضُ وَمِنْ اَنْفُسِهِمْ وَمِمَّا لَا يَعْلَمُوْنَ", latin: "Subḥānal-lażī khalaqal-azwāja kullahā mimmā tumbitul-arḍu wa min anfusihim wa mimmā lā ya‘lamūn(a).", arti: "Maha Suci (Allah) yang telah menciptakan semuanya berpasang-pasangan, baik dari apa yang ditumbuhkan oleh bumi dan dari diri mereka maupun dari apa yang tidak mereka ketahui." },
            { no: 37, arab: "وَاٰيَةٌ لَّهُمُ الَّيْلُ ۖنَسْلَخُ مِنْهُ النَّهَارَ فَاِذَا هُمْ مُّظْلِمُوْنَۙ", latin: "Wa āyatul lahumul-lail(u), naslakhu minhun-nahāra fa iżā hum muẓlimūn(a).", arti: "Dan suatu tanda (kebesaran Allah) bagi mereka adalah malam; Kami tanggalkan siang dari malam itu, maka seketika itu mereka (berada dalam) kegelapan," },
            { no: 38, arab: "وَالشَّمْسُ تَجْرِيْ لِمُسْتَقَرٍّ لَّهَا ۗذٰلِكَ تَقْدِيْرُ الْعَزِيْزِ الْعَلِيْمِۗ", latin: "Wasy-syamsu tajrī limustaqarril lahā, żālika taqdīrul-‘azīzil-‘alīm(i).", arti: "dan matahari berjalan di tempat peredarannya. Demikianlah ketetapan (Allah) Yang Mahaperkasa, Maha Mengetahui." },
            { no: 39, arab: "وَالْقَمَرَ قَدَّرْنٰهُ مَنَازِلَ حَتّٰى عَادَ كَالْعُرْجُوْنِ الْقَدِيْمِ", latin: "Wal-qamara qaddarnāhu manāzila ḥattā ‘āda kal-‘urjūnil-qadīm(i).", arti: "Dan telah Kami tetapkan bagi bulan manzilah-manzilah, sehingga (setelah dia sampai ke manzilah yang terakhir) kembalilah dia sebagai bentuk tandan yang tua." },
            { no: 40, arab: "لَا الشَّمْسُ يَنْۢبَغِيْ لَهَآ اَنْ تُدْرِكَ الْقَمَرَ وَلَا الَّيْلُ سَابِقُ النَّهَارِ ۗوَكُلٌّ فِيْ فَلَكٍ يَّسْبَحُوْنَ", latin: "Lasy-syamsu yambagī lahā an tudrikal-qamara wa lal-lailu sābiqun-nahār(i), wa kullun fī falakiy yasbaḥūn(a).", arti: "Tidaklah mungkin bagi matahari mengejar bulan dan malam pun tidak dapat mendahului siang. Masing-masing beredar pada garis edarnya." },
            { no: 41, arab: "وَاٰيَةٌ لَّهُمْ اَنَّا حَمَلْنَا ذُرِّيَّتَهُمْ فِى الْفُلْكِ الْمَشْحُوْنِۙ", latin: "Wa āyatul lahum annā ḥamalnā żurriyyatahum fil-fulkil-masyḥūn(i).", arti: "Dan suatu tanda (kebesaran Allah) bagi mereka adalah bahwa Kami angkut keturunan mereka dalam kapal yang penuh muatan," },
            { no: 42, arab: "وَخَلَقْنَا لَهُمْ مِّنْ مِّثْلِهٖ مَا يَرْكَبُوْنَ", latin: "Wa khalaqnā lahum mim miṡlihī mā yarkabūn(a).", arti: "dan Kami ciptakan (juga) untuk mereka (angkutan lain) seperti apa yang mereka kendarai." },
            { no: 43, arab: "وَاِنْ نَّشَأْ نُغْرِقْهُمْ فَلَا صَرِيْخَ لَهُمْ وَلَا هُمْ يُنْقَذُوْنَۙ", latin: "Wa in nasya' nugriqhum falā ṣarīkha lahum wa lā hum yunqażūn(a).", arti: "Dan jika Kami menghendaki, Kami tenggelamkan mereka. Maka tidak ada penolong bagi mereka dan tidak (pula) mereka diselamatkan," },
            { no: 44, arab: "اِلَّا رَحْمَةً مِّنَّا وَمَتَاعًا اِلٰى حِيْنٍ", latin: "Illā raḥmatam minnā wa matā‘an ilā ḥīn(in).", arti: "melainkan karena rahmat dari Kami dan untuk memberikan kesenangan hidup sampai waktu tertentu." },
            { no: 45, arab: "وَاِذَا قِيْلَ لَهُمُ اتَّقُوْا مَا بَيْنَ اَيْدِيْكُمْ وَمَا خَلْفَكُمْ لَعَلَّكُمْ تُرْحَمُوْنَ", latin: "Wa iżā qīla lahumuttaqū mā baina aidīkum wa mā khalfakum la‘allakum turḥamūn(a).", arti: "Dan apabila dikatakan kepada mereka, \"Takutlah kamu akan siksa yang di hadapanmu (di dunia) dan azab yang akan datang (akhirat) agar kamu mendapat rahmat.\"" },
            { no: 46, arab: "وَمَا تَأْتِيْهِمْ مِّنْ اٰيَةٍ مِّنْ اٰيٰتِ رَبِّهِمْ اِلَّا كَانُوْا عَنْهَا مُعْرِضِيْنَ", latin: "Wa mā ta'tīhim min āyatim min āyāti rabbihim illā kānū ‘anhā mu‘riḍīn(a).", arti: "Dan setiap kali suatu tanda dari tanda-tanda (kebesaran) Tuhan datang kepada mereka, mereka selalu berpaling daripadanya." },
            { no: 47, arab: "وَاِذَا قِيْلَ لَهُمْ اَنْفِقُوْا مِمَّا رَزَقَكُمُ اللهُ ۙقَالَ الَّذِيْنَ كَفَرُوْا لِلَّذِيْنَ اٰمَنُوْٓا اَنُطْعِمُ مَنْ لَّوْ يَشَاۤءُ اللهُ اَطْعَمَهٗٓ ۖاِنْ اَنْتُمْ اِلَّا فِيْ ضَلٰلٍ مُّبِيْنٍ", latin: "Wa iżā qīla lahum anfiqū mimmā razaqakumullāh(u), qālal-lażīna kafarū lil-lażīna āmanū anuṭ‘imu mal lau yasyā'ullāhu aṭ‘amahū, in antum illā fī ḍalālim mubīn(in).", arti: "Dan apabila dikatakan kepada mereka, \"Infakkanlah sebagian rezeki yang diberikan Allah kepadamu,\" orang-orang yang kafir itu berkata kepada orang-orang yang beriman, \"Apakah pantas kami memberi makan kepada orang-orang yang jika Allah menghendaki Dia akan memberinya makan? Kamu benar-benar dalam kesesatan yang nyata.\"" },
            { no: 48, arab: "وَيَقُوْلُوْنَ مَتٰى هٰذَا الْوَعْدُ اِنْ كُنْتُمْ صٰدِقِيْنَ", latin: "Wa yaqūlūna matā hāżal-wa‘du in kuntum ṣādiqīn(a).", arti: "Dan mereka berkata, \"Kapan janji (hari berbangkit) itu (terjadi) jika kamu orang yang benar?\"" },
            { no: 49, arab: "مَا يَنْظُرُوْنَ اِلَّا صَيْحَةً وَّاحِدَةً تَأْخُذُهُمْ وَهُمْ يَخِصِّمُوْنَ", latin: "Mā yanẓurūna illā ṣaiḥataw wāḥidatan ta'khużuhum wa hum yakhiṣṣimūn(a).", arti: "Mereka hanya menunggu satu teriakan, yang akan membinasakan mereka ketika mereka sedang bertengkar." },
            { no: 50, arab: "فَلَا يَسْتَطِيْعُوْنَ تَوْصِيَةً وَّلَآ اِلٰٓى اَهْلِهِمْ يَرْجِعُوْنَ", latin: "Falā yastaṭī‘ūna tauṣiyataw wa lā ilā ahlihim yarji‘ūn(a).", arti: "Sehingga mereka tidak dapat berwasiat dan tidak dapat kembali kepada keluarganya." },
            { no: 51, arab: "وَنُفِخَ فِى الصُّوْرِ فَاِذَا هُمْ مِّنْ الْاَجْدَاثِ اِلٰى رَبِّهِمْ يَنْسِلُوْنَ", latin: "Wa nufikha fiṣ-ṣūri fa iżā hum minal-ajdāṡi ilā rabbihim yansilūn(a).", arti: "Lalu ditiuplah sangkakala, maka seketika itu mereka keluar dari kuburnya (dalam keadaan hidup), menuju kepada Tuhannya." },
            { no: 52, arab: "قَالُوْا يٰوَيْلَنَا مَنْۢ بَعَثَنَا مِنْ مَّرْقَدِنَا ۜهٰذَا مَا وَعَدَ الرَّحْمٰنُ وَصَدَقَ الْمُرْسَلُوْنَ", latin: "Qālū yā wailanā mam ba‘aṡanā mim marqadinā, hāżā mā wa‘adar-raḥmānu wa ṣadaqal-mursalūn(a).", arti: "Mereka berkata, \"Celakalah kami! Siapakah yang membangkitkan kami dari tempat tidur kami (kubur)?\" Inilah yang dijanjikan (Tuhan) Yang Maha Pengasih dan benarlah rasul-rasul(-Nya)." },
            { no: 53, arab: "اِنْ كَانَتْ اِلَّا صَيْحَةً وَّاحِدَةً فَاِذَا هُمْ جَمِيْعٌ لَّدَيْنَا مُحْضَرُوْنَ", latin: "In kānat illā ṣaiḥataw wāḥidatan fa iżā hum jamī‘ul ladainā muḥḍarūn(a).", arti: "Teriakan itu hanya sekali saja, maka seketika itu mereka semua dihadapkan kepada Kami (untuk dihisab)." },
            { no: 54, arab: "فَالْيَوْمَ لَا تُظْلَمُ نَفْسٌ شَيْـًٔا وَّلَا تُجْزَوْنَ اِلَّا مَا كُنْتُمْ تَعْمَلُوْنَ", latin: "Fal-yauma lā tuẓlamu nafsun syai'aw wa lā tujzauna illā mā kuntum ta‘malūn(a).", arti: "Maka pada hari itu seseorang tidak akan dirugikan sedikit pun dan kamu tidak akan diberi balasan, kecuali sesuai dengan apa yang telah kamu kerjakan." },
            { no: 55, arab: "اِنَّ اَصْحٰبَ الْجَنَّةِ الْيَوْمَ فِيْ شُغُلٍ فٰكِهُوْنَ ۚ", latin: "Inna aṣḥābal-jannatil-yauma fī syugulin fākihūn(a).", arti: "Sesungguhnya penghuni surga pada hari itu bersenang-senang dalam kesibukan (mereka)." },
            { no: 56, arab: "هُمْ وَاَزْوَاجُهُمْ فِيْ ظِلٰلٍ عَلَى الْاَرَاۤىِٕكِ مُتَّكِـُٔوْنَ", latin: "Hum wa azwājuhum fī ẓilālin ‘alal-arā'iki muttaki'ūn(a).", arti: "Mereka dan pasangan-pasangannya berada dalam tempat yang teduh, bersandar di atas dipan-dipan." },
            { no: 57, arab: "لَهُمْ فِيْهَا فَاكِهَةٌ وَّلَهُمْ مَّا يَدَّعُوْنَ ۚ", latin: "Lahum fīhā fākihatuw wa lahum mā yadda‘ūn(a).", arti: "Di surga itu mereka memperoleh buah-buahan dan memperoleh apa saja yang mereka inginkan." },
            { no: 58, arab: "سَلٰمٌ ۗقَوْلًا مِّنْ رَّبٍّ رَّحِيْمٍ", latin: "Salāmun qaulam mir rabbir raḥīm(in).", arti: "(Kepada mereka dikatakan), \"Salam,\" sebagai ucapan selamat dari Tuhan Yang Maha Penyayang." },
            { no: 59, arab: "وَامْتَازُوا الْيَوْمَ اَيُّهَا الْمُجْرِمُوْنَ", latin: "Wamtāzul-yauma ayyuhal-mujrimūn(a).", arti: "Dan (dikatakan kepada orang-orang kafir), \"Berpisahlah kamu (dari orang-orang mukmin) pada hari ini, wahai orang-orang yang berdosa!" },
            { no: 60, arab: "اَلَمْ اَعْهَدْ اِلَيْكُمْ يٰبَنِيْٓ اٰدَمَ اَنْ لَّا تَعْبُدُوا الشَّيْطٰنَۚ اِنَّهٗ لَكُمْ عَدُوٌّ مُّبِيْنٌ", latin: "Alam a‘had ilaikum yā banī ādama al lā ta‘budusy-syaiṭān(a), innahū lakum ‘aduwwum mubīn(un).", arti: "Bukankah Aku telah memerintahkan kepadamu wahai anak cucu Adam agar kamu tidak menyembah setan? Sungguh, setan itu musuh yang nyata bagi kamu," },
            { no: 61, arab: "وَّاَنِ اعْبُدُوْنِيْ ۗهٰذَا صِرَاطٌ مُّسْتَقِيْمٌ", latin: "Wa ani‘budūnī, hāżā ṣirāṭum mustaqīm(un).", arti: "dan hendaklah kamu menyembah-Ku. Inilah jalan yang lurus.\"" },
            { no: 62, arab: "وَلَقَدْ اَضَلَّ مِنْكُمْ جِبِلًّا كَثِيْرًا ۗاَفَلَمْ تَكُوْنُوْا تَعْقِلُوْنَ", latin: "Wa laqad aḍalla minkum jibillan kaṡīrā(n), afalam takūnū ta‘qilūn(a).", arti: "Dan sungguh, ia (setan itu) telah menyesatkan sebagian besar di antara kamu. Maka apakah kamu tidak mengerti?" },
            { no: 63, arab: "هٰذِهٖ جَهَنَّمُ الَّتِيْ كُنْتُمْ تُوْعَدُوْنَ", latin: "Hāżihī jahannamul-latī kuntum tū‘adūn(a).", arti: "Inilah (neraka) Jahanam yang dahulu telah dijanjikan kepadamu." },
            { no: 64, arab: "اِصْلَوْهَا الْيَوْمَ بِمَا كُنْتُمْ تَكْفُرُوْنَ", latin: "Iṣlauhal-yauma bimā kuntum takfurūn(a).", arti: "Masuklah ke dalamnya pada hari ini karena kamu dahulu mengingkarinya." },
            { no: 65, arab: "اَلْيَوْمَ نَخْتِمُ عَلٰٓى اَفْوَاهِهِمْ وَتُكَلِّمُنَآ اَيْدِيْهِمْ وَتَشْهَدُ اَرْجُلُهُمْ بِمَا كَانُوْا يَكْسِبُوْنَ", latin: "Al-yauma nakhtimu ‘alā afwāhihim wa tukallimunā aidīhim wa tasyhadu arjuluhum bimā kānū yaksibūn(a).", arti: "Pada hari ini Kami tutup mulut mereka; tangan mereka akan berkata kepada Kami dan kaki mereka akan memberi kesaksian terhadap apa yang dahulu mereka kerjakan." },
            { no: 66, arab: "وَلَوْ نَشَاۤءُ لَطَمَسْنَا عَلٰٓى اَعْيُنِهِمْ فَاسْتَبَقُوا الصِّرَاطَ فَاَنّٰى يُبْصِرُوْنَ", latin: "Wa lau nasyā'u laṭamasnā ‘alā a‘yunihim fastabaquṣ-ṣirāṭa fa annā yubṣirūn(a).", arti: "Dan jika Kami menghendaki, pastilah Kami hapuskan penglihatan mata mereka; lalu mereka berlomba-lomba (mencari) jalan. Maka bagaimana mungkin mereka dapat melihat?" },
            { no: 67, arab: "وَلَوْ نَشَاۤءُ لَمَسَخْنٰهُمْ عَلٰى مَكَانَتِهِمْ فَمَا اسْتَطَاعُوْا مُضِيًّا وَّلَا يَرْجِعُوْنَ", latin: "Wa lau nasyā'u lamasakhnāhum ‘alā makānatihim famastaṭā‘ū muḍiyyaw wa lā yarji‘ūn(a).", arti: "Dan jika Kami menghendaki, pastilah Kami ubah bentuk mereka di tempat mereka berada; sehingga mereka tidak sanggup berjalan lagi dan juga tidak sanggup kembali." },
            { no: 68, arab: "وَمَنْ نُّعَمِّرْهُ نُنَكِّسْهُ فِى الْخَلْقِۗ اَفَلَا يَعْقِلُوْنَ", latin: "Wa man nu‘ammirhu nunakkishu fil-khalq(i), afalā ya‘qilūn(a).", arti: "Dan barang siapa Kami panjangkan umurnya niscaya Kami kembalikan dia kepada awal kejadian(nya). Maka mengapa mereka tidak mengerti?" },
            { no: 69, arab: "وَمَا عَلَّمْنٰهُ الشِّعْرَ وَمَا يَنْۢبَغِيْ لَهٗ ۗاِنْ هُوَ اِلَّا ذِكْرٌ وَّقُرْاٰنٌ مُّبِيْنٌ ۙ", latin: "Wa mā ‘allamnāhusy-syi‘ra wa mā yambagī lah(ū), in huwa illā żikruw wa qur'ānum mubīn(un).", arti: "Dan Kami tidak mengajarkan syair kepadanya (Muhammad) dan bersyair itu tidaklah pantas baginya. Al-Qur'an itu tidak lain hanyalah pelajaran dan Kitab yang jelas," },
            { no: 70, arab: "لِّيُنْذِرَ مَنْ كَانَ حَيًّا وَّيَحِقَّ الْقَوْلُ عَلَى الْكَافِرِيْنَ", latin: "Liyunżira man kāna ḥayyaw wa yaḥiqqal-qaulu ‘alal-kāfirīn(a).", arti: "agar dia (Muhammad) memberi peringatan kepada orang-orang yang hidup (hatinya) dan agar pasti ketetapan (azab) terhadap orang-orang kafir." },
            { no: 71, arab: "اَوَلَمْ يَرَوْا اَنَّا خَلَقْنَا لَهُمْ مِّمَّا عَمِلَتْ اَيْدِيْنَآ اَنْعَامًا فَهُمْ لَهَا مَالِكُوْنَ", latin: "Awalam yarau annā khalaqnā lahum mimmā ‘amilat aidīnā an‘āman fahum lahā mālikūn(a).", arti: "Dan tidakkah mereka melihat bahwa Kami telah menciptakan hewan ternak untuk mereka, yaitu sebagian dari apa yang telah Kami ciptakan dengan kekuasaan Kami, lalu mereka menguasainya?" },
            { no: 72, arab: "وَذَلَّلْنٰهَا لَهُمْ فَمِنْهَا رَكُوْبُهُمْ وَمِنْهَا يَأْكُلُوْنَ", latin: "Wa żallalnāhā lahum faminhā rakūbuhum wa minhā ya'kulūn(a).", arti: "Dan Kami menundukkannya (hewan-hewan itu) untuk mereka; lalu sebagiannya untuk menjadi tunggangan mereka dan sebagian untuk mereka makan." },
            { no: 73, arab: "وَلَهُمْ فِيْهَا مَنَافِعُ وَمَشَارِبُۗ اَفَلَا يَشْكُرُوْنَ", latin: "Wa lahum fīhā manāfi‘u wa masyārib(u), afalā yasykurūn(a).", arti: "Dan mereka memperoleh berbagai manfaat dan minuman daripadanya. Maka mengapa mereka tidak bersyukur?" },
            { no: 74, arab: "وَاتَّخَذُوْا مِنْ دُوْنِ اللهِ اٰلِهَةً لَّعَلَّهُمْ يُنْصَرُوْنَ ۗ", latin: "Wattakhażū min dūnillāhi ālihatal la‘allahum yunṣarūn(a).", arti: "Dan mereka mengambil sesembahan selain Allah agar mereka mendapat pertolongan." },
            { no: 75, arab: "لَا يَسْتَطِيْعُوْنَ نَصْرَهُمْۙ وَهُمْ لَهُمْ جُنْدٌ مُّحْضَرُوْنَ", latin: "Lā yastaṭī‘ūna naṣrahum wa hum lahum jundum muḥḍarūn(a).", arti: "Mereka (sesembahan itu) tidak dapat menolong mereka; padahal mereka itu menjadi tentara yang disiapkan untuk menjaga (sesembahan itu)." },
            { no: 76, arab: "فَلَا يَحْزُنْكَ قَوْلُهُمْ ۘاِنَّا نَعْلَمُ مَا يُسِرُّوْنَ وَمَا يُعْلِنُوْنَ", latin: "Falā yaḥzunka qauluhum, innā na‘lamu mā yusirrūna wa mā yu‘linūn(a).", arti: "Maka jangan sampai ucapan mereka membuat engkau (Muhammad) bersedih hati. Sungguh, Kami mengetahui apa yang mereka rahasiakan dan apa yang mereka nyatakan." },
            { no: 77, arab: "اَوَلَمْ يَرَ الْاِنْسَانُ اَنَّا خَلَقْنٰهُ مِنْ نُّطْفَةٍ فَاِذَا هُوَ خَصِيْمٌ مُّبِيْنٌ", latin: "Awalam yaral-insānu annā khalaqnāhu min nuṭfatin fa iżā huwa khaṣīmum mubīn(un).", arti: "Dan tidakkah manusia memperhatikan bahwa Kami menciptakannya dari setetes mani, ternyata dia menjadi musuh yang nyata!" },
            { no: 78, arab: "وَضَرَبَ لَنَا مَثَلًا وَّنَسِيَ خَلْقَهٗۗ قَالَ مَنْ يُّحْيِ الْعِظَامَ وَهِيَ رَمِيْمٌ", latin: "Wa ḍaraba lanā maṡalaw wa nasiya khalqah(ū), qāla may yuḥyil-‘iẓāma wa hiya ramīm(un).", arti: "Dan dia membuat perumpamaan bagi Kami dan melupakan asal kejadiannya; dia berkata, \"Siapakah yang dapat menghidupkan tulang-belulang, yang telah hancur luluh?\"" },
            { no: 79, arab: "قُلْ يُحْيِيْهَا الَّذِيْٓ اَنْشَاَهَآ اَوَّلَ مَرَّةٍ ۗوَهُوَ بِكُلِّ خَلْقٍ عَلِيْمٌ ۙ", latin: "Qul yuḥyīhal-lażī ansya'ahā awwala marrah(tin), wa huwa bikulli khalqin ‘alīm(un).", arti: "Katakanlah (Muhammad), \"Yang akan menghidupkannya ialah (Allah) yang menciptakannya pertama kali. Dan Dia Maha Mengetahui tentang segala makhluk," },
            { no: 80, arab: "ۨالَّذِيْ جَعَلَ لَكُمْ مِّنَ الشَّجَرِ الْاَخْضَرِ نَارًاۙ فَاِذَآ اَنْتُمْ مِّنْهُ تُوْقِدُوْنَ", latin: "Allażī ja‘ala lakum minasy-syajaril-akhḍari nārā(n), fa iżā antum minhu tūqidūn(a).", arti: "yaitu (Allah) yang menjadikan api untukmu dari kayu yang hijau, maka seketika itu kamu nyalakan (api) daripadanya.\"" },
            { no: 81, arab: "اَوَلَيْسَ الَّذِيْ خَلَقَ السَّمٰوٰتِ وَالْاَرْضَ بِقٰدِرٍ عَلٰٓى اَنْ يَّخْلُقَ مِثْلَهُمْ ۗبَلٰى وَهُوَ الْخَلّٰقُ الْعَلِيْمُ", latin: "Awa laisal-lażī khalaqas-samāwāti wal-arḍa biqādirin ‘alā ay yakhluqa miṡlahum, balā wa huwal-khallāqul-‘alīm(u).", arti: "Dan bukankah (Allah) yang menciptakan langit dan bumi, mampu menciptakan kembali yang serupa itu (jasad mereka yang sudah hancur itu)? Benar, dan Dia Maha Pencipta, Maha Mengetahui." },
            { no: 82, arab: "اِنَّمَآ اَمْرُهٗٓ اِذَآ اَرَادَ شَيْـًٔاۖ اَنْ يَّقُوْلَ لَهٗ كُنْ فَيَكُوْنُ", latin: "Innamā amruhū iżā arāda syai'an ay yaqūla lahū kun fa yakūn(u).", arti: "Sesungguhnya urusan-Nya apabila Dia menghendaki sesuatu Dia hanya berkata kepadanya, \"Jadilah!\" Maka jadilah sesuatu itu." },
            { no: 83, arab: "فَسُبْحٰنَ الَّذِيْ بِيَدِهٖ مَلَكُوْتُ كُلِّ شَيْءٍ وَّاِلَيْهِ تُرْجَعُوْنَ ࣖ", latin: "Fa subḥānal-lażī biyadihī malakūtu kulli syai'iw wa ilaihi turja‘ūn(a).", arti: "Maka Mahasuci (Allah) yang di tangan-Nya kekuasaan atas segala sesuatu dan kepada-Nya kamu dikembalikan." }
        ];

                clearTimeout(timeoutId);

                setDataMakam(almarhumList);
                setIsFirebaseConfigured(true);
                setIsLoading(false);

                clearTimeout(timeoutId);

            setTimeout(() => setSuccessMsg(''), 3000);

            setIsLoading(true);
            try {
              if (isFirebaseConfigured) {
                  await db.collection("areas").doc(newMakamName.trim()).set({ name: newMakamName.trim() });
              }
              setDaftarMakam([...daftarMakam, newMakamName.trim()]);
              setNewMakamName('');
              showSuccess('Area Makam baru berhasil ditambahkan!');
            } catch(err) { alert(err.message); }
            setIsLoading(false);
          };

          const executeDeleteMakamList = async (index) => {
            setIsLoading(true);
            const targetName = daftarMakam[index];
            try {
              if (isFirebaseConfigured) {
                  await db.collection("areas").doc(targetName).delete();
              }
              const newDaftar = daftarMakam.filter((_, i) => i !== index);
              setDaftarMakam(newDaftar);
              if (formData.namaMakam === targetName) {
                setFormData(prev => ({ ...prev, namaMakam: newDaftar[0] || '' }));
              }
              setDeleteConfirmIndex(null);
              showSuccess('Area dihapus!');
            } catch(err) { alert(err.message); }
            setIsLoading(false);
          };

          const handleUpdateMakamList = async (index) => {
            if (!editMakamValue.trim()) return;
            setIsLoading(true);
            const oldName = daftarMakam[index];
            const newName = editMakamValue.trim();

            try {
              if (isFirebaseConfigured) {
                  const batch = db.batch();
                  batch.set(db.collection("areas").doc(newName), { name: newName });
                  batch.delete(db.collection("areas").doc(oldName));
                  const snapshot = await db.collection("almarhum").where("namaMakam", "==", oldName).get();
                  snapshot.docs.forEach(doc => { batch.update(doc.ref, { namaMakam: newName }); });
                  await batch.commit();
              }
              const newDaftar = [...daftarMakam];
              newDaftar[index] = newName;

            setIsLoading(false);
          };

          };

          const saveEditData = async () => {
            if (!editDataForm.nama || !editDataForm.tglWafat || !editDataForm.namaMakam || !editDataForm.baris || !editDataForm.nisan) return;
            setIsLoading(true);

              if (isFirebaseConfigured) await db.collection("almarhum").doc(editDataId).update(payloadToUpdate);
              setDataMakam(prev => prev.map(item => item.id === editDataId ? payloadToUpdate : item));
              setEditDataId(null);
              showSuccess('Diperbarui!');
            } catch(err) { alert(err.message); }
            setIsLoading(false);
          };

            setIsLoading(true);
            try {
              if (isFirebaseConfigured) await db.collection("almarhum").doc(id).delete();
              setDataMakam(prev => prev.filter(item => item.id !== id));
              setDeleteDataConfirmId(null);
              showSuccess('Dihapus!');
            } catch(err) { alert(err.message); }
            setIsLoading(false);
          };

          return (
            <div className="min-h-screen bg-stone-100 font-sans text-stone-800">
              {isLoading && (
                <div className="fixed inset-0 bg-white/60 backdrop-blur-sm z-50 flex items-center justify-center">
                  <div className="bg-emerald-800 text-white px-6 py-3 rounded-xl shadow-lg flex items-center gap-3">
                    <Loader2 className="animate-spin" size={24} />
                    <span className="font-semibold">Memproses Database...</span>
                  </div>

                                      <td className="p-3 text-center">
                                        {deleteDataConfirmId === makam.id ? (
                                          <div className="flex flex-col gap-1 items-center bg-red-50 p-1 rounded"><span className="text-[10px] text-red-800 font-bold">Hapus?</span><div className="flex gap-1"><button onClick={() => executeDeleteData(makam.id)} className="px-2 py-0.5 bg-red-600 text-white rounded text-xs">Ya</button><button onClick={() => setDeleteDataConfirmId(null)} className="px-2 py-0.5 bg-stone-200 text-stone-700 rounded text-xs">X</button></div></div>
                                        ) : (
                                          <div className="flex justify-center gap-1"><button onClick={() => startEditData(makam)} className="p-1.5 text-blue-600 hover:bg-blue-50 rounded"><Edit2 size={16} /></button><button onClick={() => setDeleteDataConfirmId(makam.id)} className="p-1.5 text-red-600 hover:bg-red-50 rounded"><Trash2 size={16} /></button></div>
                                        )}
                                      </td>
                                    </tr>
                                  )
                                ))}
                              </tbody>
                            </table>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                )}

              </main>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
