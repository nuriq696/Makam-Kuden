<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Tata Letak Makam (Firebase)</title>
    
    <!-- 1. Load Tailwind CSS untuk Desain -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 2. Load FontAwesome untuk Ikon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- 3. Load Mesin React via CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- 4. Load Babel untuk Menerjemahkan Kode JSX -->
    <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>

    <!-- 5. FIREBASE SDK (Versi Compat agar mudah digunakan via CDN di Blogger) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
</head>
<body class="bg-stone-100">
    
    <div id="root"></div>

    <!-- Hapus atribut data-type="module" untuk mencegah error kompilasi asinkronus Babel -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        const Search = ({size, className}) => <i className={`fa-solid fa-magnifying-glass ${className||''}`} style={{fontSize: size}}></i>;
        const Eye = ({size, className}) => <i className={`fa-solid fa-eye ${className||''}`} style={{fontSize: size}}></i>;
        const EyeOff = ({size, className}) => <i className={`fa-solid fa-eye-slash ${className||''}`} style={{fontSize: size}}></i>;
        const MapPin = ({size, className}) => <i className={`fa-solid fa-location-dot ${className||''}`} style={{fontSize: size}}></i>;
        const Calendar = ({size, className}) => <i className={`fa-solid fa-calendar ${className||''}`} style={{fontSize: size}}></i>;
        const MapIcon = ({size, className}) => <i className={`fa-solid fa-map ${className||''}`} style={{fontSize: size}}></i>;
        const ArrowLeft = ({size, className}) => <i className={`fa-solid fa-arrow-left ${className||''}`} style={{fontSize: size}}></i>;
        const Lock = ({size, className}) => <i className={`fa-solid fa-lock ${className||''}`} style={{fontSize: size}}></i>;
        const LogOut = ({size, className}) => <i className={`fa-solid fa-right-from-bracket ${className||''}`} style={{fontSize: size}}></i>;
        const Plus = ({size, className}) => <i className={`fa-solid fa-plus ${className||''}`} style={{fontSize: size}}></i>;
        const CheckCircle2 = ({size, className}) => <i className={`fa-solid fa-circle-check ${className||''}`} style={{fontSize: size}}></i>;
        const ShieldAlert = ({size, className}) => <i className={`fa-solid fa-shield-halved ${className||''}`} style={{fontSize: size}}></i>;
        const Edit2 = ({size, className}) => <i className={`fa-solid fa-pen-to-square ${className||''}`} style={{fontSize: size}}></i>;
        const Trash2 = ({size, className}) => <i className={`fa-solid fa-trash ${className||''}`} style={{fontSize: size}}></i>;
        const X = ({size, className}) => <i className={`fa-solid fa-xmark ${className||''}`} style={{fontSize: size}}></i>;
        const Save = ({size, className}) => <i className={`fa-solid fa-floppy-disk ${className||''}`} style={{fontSize: size}}></i>;
        const BookOpen = ({size, className}) => <i className={`fa-solid fa-book-open ${className||''}`} style={{fontSize: size}}></i>;
        const Loader2 = ({size, className}) => <i className={`fa-solid fa-spinner fa-spin ${className||''}`} style={{fontSize: size}}></i>;
        const ChevronDown = ({size, className}) => <i className={`fa-solid fa-chevron-down ${className||''}`} style={{fontSize: size}}></i>;
        const ChevronUp = ({size, className}) => <i className={`fa-solid fa-chevron-up ${className||''}`} style={{fontSize: size}}></i>;

        // =====================================================================
        // KONFIGURASI FIREBASE ANDA
        // =====================================================================
        const firebaseConfig = {
          apiKey: "AIzaSyAUpnj5e_umu4SxU_2wCCZPk5DZNPf9CXY",
          authDomain: "makamkuden.firebaseapp.com",
          projectId: "makamkuden",
          storageBucket: "makamkuden.firebasestorage.app",
          messagingSenderId: "539281636487",
          appId: "1:539281636487:web:1599771549c69404474c22",
          measurementId: "G-7XE81M3K3N"
        };

        // Inisialisasi Firebase
        if (!firebase.apps.length) {
          firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        const suratYasinData = [
            { no: 1, arab: "يٰسۤ ۚ", latin: "Yaa siin.", arti: "Ya Sin." },
            { no: 2, arab: "وَالْقُرْاٰنِ الْحَكِيْمِۙ", latin: "Wal qur'aanil hakiim.", arti: "Demi Al-Qur'an yang penuh hikmah," },
            { no: 3, arab: "اِنَّكَ لَمِنَ الْمُرْسَلِيْنَۙ", latin: "Innaka laminal mursaliin.", arti: "sungguh, engkau (Muhammad) adalah salah seorang dari rasul-rasul," },
            { no: 4, arab: "عَلٰى صِرَاطٍ مُّسْتَقِيْمٍۗ", latin: "'Alaa shiraathim mustaqiim.", arti: "(yang berada) di atas jalan yang lurus," },
            { no: 5, arab: "تَنْزِيْلَ الْعَزِيْزِ الرَّحِيْمِۙ", latin: "Tanziilal 'aziizir rahiim.", arti: "(sebagai wahyu) yang diturunkan oleh (Allah) Yang Mahaperkasa, Maha Penyayang," },
            // ... dst ...
            { no: 83, arab: "فَسُبْحٰنَ الَّذِيْ بِيَدِهٖ مَلَكُوْتُ كُلِّ شَيْءٍ وَّاِلَيْهِ تُرْجَعُوْنَ ࣖ", latin: "Fasubhaanal-ladzii biyadihii malakuutu kulli syai'iw wa ilaihi turja'uun.", arti: "Maka Mahasuci (Allah) yang di tangan-Nya kekuasaan atas segala sesuatu dan kepada-Nyalah kamu dikembalikan." }
        ];

        function App() {
          const [dataMakam, setDataMakam] = useState([]);
          const [daftarMakam, setDaftarMakam] = useState([]);
          const [view, setView] = useState('public'); 
          const [searchTerm, setSearchTerm] = useState('');
          const [selectedMakam, setSelectedMakam] = useState(null);
          const [isLoading, setIsLoading] = useState(false); 
          const [showYasin, setShowYasin] = useState(false);
          const [isFirebaseConfigured, setIsFirebaseConfigured] = useState(false);

          // State Auth
          const [username, setUsername] = useState('');
          const [password, setPassword] = useState('');
          const [loginError, setLoginError] = useState('');
          const [showPassword, setShowPassword] = useState(false);

          // State Form
          const [formData, setFormData] = useState({
            nama: '', tglWafat: '', namaMakam: '', baris: 1, nisan: 1
          });
          const [successMsg, setSuccessMsg] = useState('');
          
          const [newMakamName, setNewMakamName] = useState('');
          const [editMakamIndex, setEditMakamIndex] = useState(null);
          const [editMakamValue, setEditMakamValue] = useState('');
          const [deleteConfirmIndex, setDeleteConfirmIndex] = useState(null);

          const [editDataId, setEditDataId] = useState(null);
          const [editDataForm, setEditDataForm] = useState({});
          const [deleteDataConfirmId, setDeleteDataConfirmId] = useState(null);

          // Sinkronisasi form dengan daftar makam yang ada
          useEffect(() => {
            if (daftarMakam.length > 0 && !daftarMakam.includes(formData.namaMakam)) {
              setFormData(prev => ({ ...prev, namaMakam: daftarMakam[0] }));
            }
          }, [daftarMakam, formData.namaMakam]);

          // GET DATA DARI FIREBASE (DENGAN TIMEOUT DAN ERROR HANDLING)
          useEffect(() => {
            const fetchFromFirebase = async () => {
              if (firebaseConfig.apiKey === "API_KEY_FIREBASE_ANDA") return;
              
              setIsLoading(true);

              // Fallback jika Firestore menggantung (hang) karena database belum di-create
              const timeoutId = setTimeout(() => {
                  setIsLoading(false);
                  alert("Koneksi ke Database sangat lama! \n\nPastikan Anda sudah mengklik tombol 'Create Database' di menu Firestore Database pada akun Firebase Anda.");
              }, 8000);

              try {
                // 1. Ambil Koleksi Area Makam
                const areaSnapshot = await db.collection("areas").get();
                const areasList = areaSnapshot.docs.map(doc => doc.id); 
                
                // 2. Ambil Koleksi Data Almarhum
                const almarhumSnapshot = await db.collection("almarhum").get();
                const almarhumList = almarhumSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));

                clearTimeout(timeoutId); // Berhasil, matikan fungsi timeout
                setDaftarMakam(areasList);
                setDataMakam(almarhumList);
                setIsFirebaseConfigured(true);
                setIsLoading(false);
              } catch (error) {
                clearTimeout(timeoutId); // Error terjadi, matikan timeout
                console.error("Error mengambil data dari Firebase:", error);
                
                let pesanError = "Gagal terhubung ke Database.\n";
                if (error.message.includes("Missing or insufficient permissions")) {
                    pesanError += "\nSebab: Aturan Keamanan (Rules) Anda memblokir akses. Ubah 'allow read, write: if false;' menjadi 'allow read, write: if true;'";
                }
                
                alert(pesanError);
                setLoginError(pesanError);
                setIsLoading(false);
              }
            };
            fetchFromFirebase();
          }, []);

          const filteredData = dataMakam.filter(makam =>
            makam.nama.toLowerCase().includes(searchTerm.toLowerCase())
          );

          const handleSearch = (e) => {
            setSearchTerm(e.target.value);
            setSelectedMakam(null);
          };

          const handleLogin = (e) => {
            e.preventDefault();
            setIsLoading(true);
            setTimeout(() => {
                if (username === 'admin' && password === 'admin2026') {
                    setView('admin'); setLoginError(''); setSelectedMakam(null); setSearchTerm(''); setShowPassword(false);
                } else {
                    setLoginError('Username atau Password salah!');
                }
                setIsLoading(false);
            }, 800);
          };

          const handleLogout = () => {
            setView('public'); setSuccessMsg(''); setUsername(''); setPassword(''); setShowPassword(false);
          };

          const showSuccess = (msg) => {
            setSuccessMsg(msg);
            setTimeout(() => setSuccessMsg(''), 3000);
          };

          const handleAddMakamList = async (e) => {
            e.preventDefault();
            if (!newMakamName.trim()) return;
            setIsLoading(true);
            try {
              if (isFirebaseConfigured) {
                  await db.collection("areas").doc(newMakamName.trim()).set({ name: newMakamName.trim() });
              }
              setDaftarMakam([...daftarMakam, newMakamName.trim()]);
              setNewMakamName('');
              showSuccess('Area Makam baru berhasil ditambahkan!');
            } catch(err) {
              alert("Error: " + err.message);
            }
            setIsLoading(false);
          };

          const confirmDeleteMakam = (index) => setDeleteConfirmIndex(index);
          const cancelDeleteMakam = () => setDeleteConfirmIndex(null);

          const executeDeleteMakamList = async (index) => {
            setIsLoading(true);
            const targetName = daftarMakam[index];
            try {
              if (isFirebaseConfigured) {
                  await db.collection("areas").doc(targetName).delete();
              }
              const newDaftar = daftarMakam.filter((_, i) => i !== index);
              setDaftarMakam(newDaftar);
              if (formData.namaMakam === targetName) {
                setFormData(prev => ({ ...prev, namaMakam: newDaftar[0] || '' }));
              }
              setDeleteConfirmIndex(null);
              showSuccess('Area Makam berhasil dihapus!');
            } catch(err) { alert("Error: " + err.message); }
            setIsLoading(false);
          };

          const handleUpdateMakamList = async (index) => {
            if (!editMakamValue.trim()) return;
            setIsLoading(true);
            const oldName = daftarMakam[index];
            const newName = editMakamValue.trim();

            try {
              if (isFirebaseConfigured) {
                  const batch = db.batch();
                  batch.set(db.collection("areas").doc(newName), { name: newName });
                  batch.delete(db.collection("areas").doc(oldName));
                  
                  const snapshot = await db.collection("almarhum").where("namaMakam", "==", oldName).get();
                  snapshot.docs.forEach(doc => {
                      batch.update(doc.ref, { namaMakam: newName });
                  });
                  await batch.commit();
              }

              const newDaftar = [...daftarMakam];
              newDaftar[index] = newName;
              setDaftarMakam(newDaftar);

              setDataMakam(prevData => prevData.map(item => 
                item.namaMakam === oldName ? { ...item, namaMakam: newName } : item
              ));

              if (formData.namaMakam === oldName) setFormData(prev => ({ ...prev, namaMakam: newName }));
              
              setEditMakamIndex(null);
              setEditMakamValue('');
              showSuccess('Nama Makam berhasil diperbarui!');
            } catch(err) { alert("Error: " + err.message); }
            setIsLoading(false);
          };

          const handleFormChange = (e) => {
            const { name, value } = e.target;
            setFormData(prev => ({
              ...prev,
              [name]: (name === 'baris' || name === 'nisan') ? parseInt(value) || '' : value
            }));
          };

          const handleAddData = async (e) => {
            e.preventDefault();
            if (!formData.nama || !formData.tglWafat || !formData.namaMakam || !formData.baris || !formData.nisan) {
              setLoginError('Semua kolom harus diisi!');
              return;
            }

            setIsLoading(true);
            const newDataPayload = { ...formData, baris: parseInt(formData.baris), nisan: parseInt(formData.nisan) };
            
            try {
              let newId = Date.now().toString();
              if (isFirebaseConfigured) {
                  const docRef = await db.collection("almarhum").add({
                      ...newDataPayload,
                      createdAt: firebase.firestore.FieldValue.serverTimestamp()
                  });
                  newId = docRef.id;
              }
              const newData = { id: newId, ...newDataPayload };
              
              setDataMakam(prev => [newData, ...prev]);
              showSuccess(`Data almarhum ${formData.nama} berhasil ditambahkan!`);
              setLoginError('');
              setFormData({ nama: '', tglWafat: '', namaMakam: daftarMakam[0] || '', baris: 1, nisan: 1 });
            } catch(err) { alert("Error: " + err.message); }
            setIsLoading(false);
          };

          const startEditData = (makam) => {
            setEditDataId(makam.id);
            setEditDataForm({ ...makam });
            setDeleteDataConfirmId(null);
          };

          const handleEditDataChange = (e) => {
            const { name, value } = e.target;
            setEditDataForm(prev => ({
              ...prev,
              [name]: (name === 'baris' || name === 'nisan') ? parseInt(value) || '' : value
            }));
          };

          const saveEditData = async () => {
            if (!editDataForm.nama || !editDataForm.tglWafat || !editDataForm.namaMakam || !editDataForm.baris || !editDataForm.nisan) return;
            setIsLoading(true);
            try {
              const payloadToUpdate = { ...editDataForm, baris: parseInt(editDataForm.baris), nisan: parseInt(editDataForm.nisan) };
              if (isFirebaseConfigured) {
                  await db.collection("almarhum").doc(editDataId).update(payloadToUpdate);
              }
              setDataMakam(prev => prev.map(item => item.id === editDataId ? payloadToUpdate : item));
              setEditDataId(null);
              showSuccess('Data penghuni makam berhasil diperbarui!');
            } catch(err) { alert("Error: " + err.message); }
            setIsLoading(false);
          };

          const executeDeleteData = async (id) => {
            setIsLoading(true);
            try {
              if (isFirebaseConfigured) {
                  await db.collection("almarhum").doc(id).delete();
              }
              setDataMakam(prev => prev.filter(item => item.id !== id));
              setDeleteDataConfirmId(null);
              showSuccess('Data penghuni makam berhasil dihapus!');
            } catch(err) { alert("Error: " + err.message); }
            setIsLoading(false);
          };

          return (
            <div className="min-h-screen bg-stone-100 font-sans text-stone-800">
              {isLoading && (
                <div className="fixed inset-0 bg-white/60 backdrop-blur-sm z-50 flex items-center justify-center">
                  <div className="bg-emerald-800 text-white px-6 py-3 rounded-xl shadow-lg flex items-center gap-3">
                    <Loader2 className="animate-spin" size={24} />
                    <span className="font-semibold">Memproses Database...</span>
                  </div>
                </div>
              )}

              <header className="bg-emerald-800 text-white p-4 md:p-6 shadow-md relative z-20">
                <div className="max-w-5xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-4">
                  <div className="flex items-center gap-3">
                    <MapIcon size={32} className="text-emerald-300" />
                    <div>
                      <h1 className="text-xl md:text-2xl font-bold">Sistem Tata Letak Makam</h1>
                      <p className="text-emerald-200 text-xs md:text-sm">Pencarian & Visualisasi Lokasi</p>
                    </div>
                  </div>
                  
                  <div className="flex flex-wrap items-center gap-2">
                    {(view === 'public' || view === 'panduan') && (
                      <div className="flex gap-2 mr-2 border-r border-emerald-700 pr-4">
                        <button 
                          onClick={() => {setView('public'); setSelectedMakam(null);}} 
                          className={`flex items-center gap-2 px-3 py-1.5 rounded-lg text-sm transition-colors ${view === 'public' ? 'bg-emerald-600 font-bold' : 'hover:bg-emerald-700 text-emerald-100'}`}
                        >
                          <Search size={16} /> Pencarian
                        </button>
                        <button 
                          onClick={() => setView('panduan')} 
                          className={`flex items-center gap-2 px-3 py-1.5 rounded-lg text-sm transition-colors ${view === 'panduan' ? 'bg-emerald-600 font-bold' : 'hover:bg-emerald-700 text-emerald-100'}`}
                        >
                          <BookOpen size={16} /> Panduan Ziarah
                        </button>
                      </div>
                    )}

                    {view === 'admin' ? (
                      <button onClick={handleLogout} className="flex items-center gap-2 bg-emerald-900 hover:bg-emerald-950 px-4 py-2 rounded-lg text-sm transition-colors">
                        <LogOut size={16} /> Keluar Admin
                      </button>
                    ) : view === 'login' ? (
                       <button onClick={() => setView('public')} className="flex items-center gap-2 text-emerald-200 hover:text-white text-sm transition-colors">
                        <ArrowLeft size={16} /> Kembali
                      </button>
                    ) : (
                       <button onClick={() => setView('login')} className="flex items-center gap-2 bg-emerald-700 hover:bg-emerald-600 px-4 py-2 rounded-lg text-sm transition-colors border border-emerald-600">
                        <Lock size={16} /> Petugas
                      </button>
                    )}
                  </div>
                </div>
              </header>

              <main className="max-w-5xl mx-auto p-4 md:p-6">
                
                {/* --- VIEW PANDUAN --- */}
                {view === 'panduan' && (
                  <div className="space-y-6 animate-in fade-in duration-500">
                    <div className="bg-white p-6 md:p-8 rounded-xl shadow-sm border border-stone-200">
                      <div className="text-center mb-8 border-b border-stone-100 pb-6">
                        <div className="bg-emerald-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                          <BookOpen size={32} className="text-emerald-700" />
                        </div>
                        <h2 className="text-2xl md:text-3xl font-bold text-stone-800">Tata Cara Ziarah Kubur</h2>
                        <p className="text-stone-500 mt-2">Adab dan tuntunan saat mengunjungi makam keluarga dan kaum muslimin.</p>
                      </div>

                      <div className="space-y-8 max-w-3xl mx-auto">
                        <div className="flex gap-4">
                          <div className="shrink-0 w-10 h-10 bg-emerald-600 text-white rounded-full flex items-center justify-center font-bold text-lg">1</div>
                          <div>
                            <h3 className="text-lg font-bold text-stone-800 mb-1">Berwudhu Terlebih Dahulu</h3>
                            <p className="text-stone-600 leading-relaxed">Disunnahkan dalam keadaan suci (berwudhu) sebelum memasuki area pekuburan.</p>
                          </div>
                        </div>

                        <div className="flex gap-4">
                          <div className="shrink-0 w-10 h-10 bg-emerald-600 text-white rounded-full flex items-center justify-center font-bold text-lg">2</div>
                          <div>
                            <h3 className="text-lg font-bold text-stone-800 mb-1">Mengucapkan Salam Saat Masuk</h3>
                            <div className="bg-stone-50 p-4 rounded-lg mt-2 border border-stone-100">
                              <p className="text-stone-800 font-medium italic text-center text-lg mb-2">"Assalâmu 'alâ ahlid diyâr minal mu'minîna wal muslimîn..."</p>
                            </div>
                          </div>
                        </div>

                        <div className="flex gap-4">
                          <div className="shrink-0 w-10 h-10 bg-emerald-600 text-white rounded-full flex items-center justify-center font-bold text-lg">3</div>
                          <div>
                            <h3 className="text-lg font-bold text-stone-800 mb-1">Menjaga Adab: Tidak Menginjak/Menduduki Nisan</h3>
                            <p className="text-stone-600 leading-relaxed">Berjalanlah melalui sela-sela antar makam. Dilarang keras duduk, menginjak, atau melangkah tepat di atas gundukan makam.</p>
                          </div>
                        </div>

                        <div className="flex gap-4">
                          <div className="shrink-0 w-10 h-10 bg-emerald-600 text-white rounded-full flex items-center justify-center font-bold text-lg">4</div>
                          <div>
                            <h3 className="text-lg font-bold text-stone-800 mb-1">Membaca Doa dan Ayat Suci Al-Quran</h3>
                            <p className="text-stone-600 leading-relaxed">Posisikan diri menghadap wajah ahli kubur. Bacakan doa memohon ampunan untuk ahli kubur.</p>
                          </div>
                        </div>
                      </div>

                      <div className="mt-12 pt-8 border-t border-stone-200 max-w-3xl mx-auto">
                        <div className="text-center mb-8">
                          <h3 className="text-2xl font-bold text-emerald-900 mb-2 flex items-center justify-center gap-3">
                            <BookOpen className="text-emerald-600" size={24} /> Kumpulan Doa Ziarah Kubur
                          </h3>
                        </div>
                        
                        <div className="space-y-6">
                          <div className="bg-emerald-50 rounded-xl p-5 md:p-6 border border-emerald-100 shadow-sm">
                            <h4 className="font-bold text-emerald-800 border-b border-emerald-200 pb-2 mb-4">1. Doa Salam (Saat Memasuki Area Makam)</h4>
                            <p className="text-right text-2xl md:text-3xl leading-loose font-serif text-stone-800 mb-4" dir="rtl">
                              السَّلَامُ عَلَيْكُمْ أَهْلَ الدِّيَارِ مِنَ الْمُؤْمِنِينَ وَالْمُسْلِمِينَ، وَإِنَّا إِنْ شَاءَ اللهُ بِكُمْ لَلَاحِقُونَ، أَسْأَلُ اللهَ لَنَا وَلَكُمُ الْعَافِيَةَ
                            </p>

                              </thead>
                              <tbody className="divide-y divide-stone-100 text-sm">
                                {dataMakam.map((makam, index) => (
                                  editDataId === makam.id ? (
                                    <tr key={makam.id} className="bg-emerald-50/70">
                                      <td className="p-3 text-stone-500 text-center">{index + 1}</td>
                                      <td className="p-3">
                                        <input type="text" name="nama" value={editDataForm.nama} onChange={handleEditDataChange} className="w-full px-2 py-1.5 border border-emerald-400 rounded text-sm outline-none focus:ring-2 focus:ring-emerald-500 bg-white" placeholder="Nama" />
                                      </td>
                                      <td className="p-3">
                                        <input type="text" name="tglWafat" value={editDataForm.tglWafat} onChange={handleEditDataChange} className="w-full px-2 py-1.5 border border-emerald-400 rounded text-sm outline-none focus:ring-2 focus:ring-emerald-500 bg-white" placeholder="Tgl Wafat" />
                                      </td>
                                      <td className="p-3">
                                        <div className="flex flex-col xl:flex-row gap-1">
                                          <select name="namaMakam" value={editDataForm.namaMakam} onChange={handleEditDataChange} className="px-2 py-1.5 border border-emerald-400 rounded text-sm outline-none focus:ring-2 focus:ring-emerald-500 bg-white min-w-[100px]">
                                            {daftarMakam.map((m, i) => {
                                              const jumlah = dataMakam.filter(item => item.namaMakam === m).length;
                                              return <option key={i} value={m}>{m} ({jumlah} data)</option>;
                                            })}
                                          </select>
                                          <div className="flex gap-1">
                                            <input type="number" name="baris" min="1" value={editDataForm.baris} onChange={handleEditDataChange} className="w-14 px-2 py-1.5 border border-emerald-400 rounded text-sm outline-none focus:ring-2 focus:ring-emerald-500 bg-white" title="Baris" placeholder="Brs"/>
                                            <input type="number" name="nisan" min="1" value={editDataForm.nisan} onChange={handleEditDataChange} className="w-14 px-2 py-1.5 border border-emerald-400 rounded text-sm outline-none focus:ring-2 focus:ring-emerald-500 bg-white" title="No Nisan" placeholder="Nis"/>
                                          </div>
                                        </div>
                                      </td>
                                      <td className="p-3 text-center">
                                        <div className="flex justify-center gap-1">
                                          <button onClick={saveEditData} className="p-1.5 bg-emerald-100 text-emerald-700 rounded hover:bg-emerald-200 transition-colors shadow-sm" title="Simpan Perubahan"><Save size={16} /></button>
                                          <button onClick={() => setEditDataId(null)} className="p-1.5 bg-stone-200 text-stone-600 rounded hover:bg-stone-300 transition-colors shadow-sm" title="Batal Edit"><X size={16} /></button>
                                        </div>
                                      </td>
                                    </tr>
                                  ) : (
                                    <tr key={makam.id} className="hover:bg-stone-50 transition-colors">
                                      <td className="p-3 text-stone-500 text-center">{index + 1}</td>
                                      <td className="p-3 font-medium text-stone-800">{makam.nama}</td>
                                      <td className="p-3 text-stone-600">{makam.tglWafat}</td>
                                      <td className="p-3">
                                        <span className="inline-flex items-center gap-1.5 bg-emerald-100 text-emerald-800 px-2.5 py-1 rounded-md font-medium text-xs">
                                          <MapPin size={12}/> {makam.namaMakam} - B{makam.baris} - N{makam.nisan}
                                        </span>
                                      </td>
                                      <td className="p-3 text-center">
                                        {deleteDataConfirmId === makam.id ? (
                                          <div className="flex items-center justify-center gap-1 bg-red-50 border border-red-200 p-1 rounded">
                                            <span className="text-[10px] text-red-800 font-bold hidden sm:inline">Hapus?</span>
                                            <button onClick={() => executeDeleteData(makam.id)} className="px-2 py-1 bg-red-600 text-white rounded hover:bg-red-700 text-xs font-bold transition-colors shadow-sm">Ya</button>
                                            <button onClick={() => setDeleteDataConfirmId(null)} className="px-2 py-1 bg-stone-200 text-stone-700 rounded hover:bg-stone-300 text-xs font-bold transition-colors shadow-sm">X</button>
                                          </div>
                                        ) : (
                                          <div className="flex justify-center gap-1">
                                            <button onClick={() => startEditData(makam)} className="p-1.5 text-blue-600 hover:bg-blue-50 rounded transition-colors" title="Edit Data Almarhum"><Edit2 size={16} /></button>
                                            <button onClick={() => setDeleteDataConfirmId(makam.id)} className="p-1.5 text-red-600 hover:bg-red-50 rounded transition-colors" title="Hapus Data Almarhum"><Trash2 size={16} /></button>
                                          </div>
                                        )}
                                      </td>
                                    </tr>
                                  )
                                ))}
                              </tbody>
                            </table>
                          </div>
                        </div>

                      </div>
                    </div>
                  </div>
                )}

              </main>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
